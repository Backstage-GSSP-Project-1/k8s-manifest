apiVersion: v1
kind: Service
metadata:
  name: example-repo-3
spec:
  type: NodePort
  selector:
    app: example-repo-3
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30017   # You can change this (range: 30000–32767)
      
