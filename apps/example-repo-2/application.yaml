apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: example-repo-2
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Backstage-GSSP-Project-1/k8s-manifest.git
    targetRevision: main
    path: apps/example-repo-2
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  ignoreDifferences:
  - group: argoproj.io
    kind: Application
    jsonPointers:
    - /metadata/annotations/argocd.argoproj.io~1tracking-id
